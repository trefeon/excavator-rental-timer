<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>BLE Web Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #e2e8f0;
      --panel: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --success-bg: #d1fae5;
      --warning: #f59e0b;
      --warning-bg: #fef3c7;
      --danger: #ef4444;
      --danger-bg: #fee2e2;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body {
      background: var(--bg); color: var(--text-main);
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%; max-width: 480px; min-height: 100vh;
      background: var(--panel); position: relative;
      overflow-y: auto; padding-bottom: 50px;
    }

    .header {
      background: #ffffff; padding: 20px 20px 15px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .connect-btn {
      background: var(--primary); color: white; border: none;
      width: calc(100% - 40px); margin: 20px; padding: 16px;
      border-radius: 12px; font-weight: 700; font-size: 16px;
      cursor: pointer; display: block;
      pointer-events: auto; opacity: 1;
    }
    
    .disconnect-btn {
      background: var(--danger-bg); color: var(--danger); border: none;
      width: calc(100% - 40px); margin: 0 20px 20px 20px; padding: 12px;
      border-radius: 12px; font-weight: 700; font-size: 14px;
      cursor: pointer; display: none;
      pointer-events: auto; opacity: 1;
    }

    .status-panel {
      margin: 20px; text-align: center;
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }

    .time-display {
      font-size: 64px; font-weight: 800; font-variant-numeric: tabular-nums;
      line-height: 1; margin-bottom: 12px; color: var(--text-main);
    }
    
    .state-badge {
      display: inline-block; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 700; background: #e2e8f0; color: #475569;
    }
    .state-badge.RUNNING { background: var(--success-bg); color: #047857; }
    .state-badge.PAUSED { background: var(--warning-bg); color: #b45309; }
    .state-badge.LOCKED, .state-badge.ENDED { background: var(--danger-bg); color: #b91c1c; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 24px; }
    button {
      border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600;
      cursor: pointer; opacity: 0.5; pointer-events: none;
    }
    button.active-btn { opacity: 1; pointer-events: auto; }
    
    .btn-add { background: var(--success-bg); color: #047857; }
    .btn-pause { background: var(--warning-bg); color: #b45309; }
    .btn-stop { background: var(--danger-bg); color: #b91c1c; }

    #log-container {
      margin: 0 20px; font-family: monospace; font-size: 11px;
      background: #0f172a; color: #10b981; padding: 12px;
      border-radius: 12px; height: 150px; overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>BLE Web Controller</h1>
      <div style="font-size:12px; color:var(--text-muted)">Relay & Buzzer Demo</div>
    </div>
    
    <button id="btn-connect" class="connect-btn" onclick="connectBle()">Scan & Connect ESP32</button>
    <button id="btn-disconnect" class="disconnect-btn" onclick="disconnectBle()">Disconnect</button>

    <div class="status-panel">
      <div class="time-display" id="disp-time">00:00</div>
      <div class="state-badge" id="disp-state">DISCONNECTED</div>
    </div>

    <div class="controls">
      <button id="btn-add5" class="btn-add" onclick="sendCommand('ADD_TIME', 300)">+ 5 Menit</button>
      <button id="btn-add10" class="btn-add" onclick="sendCommand('ADD_TIME', 600)">+ 10 Menit</button>
      <button id="btn-pause" class="btn-pause" onclick="togglePause()">Pause</button>
      <button id="btn-stop" class="btn-stop" onclick="sendCommand('STOP', 0)">Stop</button>
    </div>

    <div id="log-container"></div>
  </div>

  <script>
    const SERVICE_UUID = "7b7d0001-8f2a-4f6b-9b2e-2f3ad5a10001";
    const STATE_CHAR_UUID = "7b7d0002-8f2a-4f6b-9b2e-2f3ad5a10001";
    const COMMAND_CHAR_UUID = "7b7d0003-8f2a-4f6b-9b2e-2f3ad5a10001";

    let bleDevice = null;
    let bleServer = null;
    let cmdChar = null;
    let stateChar = null;
    let commandId = 100;

    let currentState = "DISCONNECTED";

    function log(msg) {
      const el = document.getElementById('log-container');
      const d = new Date();
      const time = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
      el.insertAdjacentHTML('beforeend', `[${time}] ${msg}<br>`);
      el.scrollTop = el.scrollHeight;
    }

    async function connectBle() {
      console.log("Connect button clicked");
      
      if (!navigator.bluetooth) {
        alert("❌ Web Bluetooth tidak didukung di browser ini. Gunakan Google Chrome versi terbaru dan pastikan URL adalah http://localhost (bukan file://).");
        return;
      }

      try {
        const isAvailable = await navigator.bluetooth.getAvailability();
        if (!isAvailable) {
          alert("❌ Bluetooth di laptop/PC Anda sepertinya mati atau tidak memiliki adapter Bluetooth. Harap nyalakan Bluetooth Windows Anda terlebih dahulu!");
          return;
        }
      } catch(e) {
        // getAvailability might not be supported on all versions, ignore if error
        console.log("getAvailability check skipped:", e);
      }

      try {
        log("Requesting device with Service UUID...");
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnect);

        log(`Connecting to GATT Server... (${bleDevice.name})`);
        bleServer = await bleDevice.gatt.connect();

        log("Getting Service...");
        const service = await bleServer.getPrimaryService(SERVICE_UUID);

        log("Getting Characteristics...");
        cmdChar = await service.getCharacteristic(COMMAND_CHAR_UUID);
        stateChar = await service.getCharacteristic(STATE_CHAR_UUID);

        log("Starting Notifications...");
        await stateChar.startNotifications();
        stateChar.addEventListener('characteristicvaluechanged', handleStateChanged);

        log("Connected!");
        document.getElementById('btn-connect').style.display = 'none';
        document.getElementById('btn-disconnect').style.display = 'block';
        
        enableButtons(true);
        
        // Initial fetch
        const val = await stateChar.readValue();
        parseStateValue(val);

      } catch (err) {
        log("Error: " + err);
      }
    }

    function disconnectBle() {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
    }

    function onDisconnect() {
      log("Disconnected from device.");
      document.getElementById('btn-connect').style.display = 'block';
      document.getElementById('btn-disconnect').style.display = 'none';
      enableButtons(false);
      updateUI("DISCONNECTED", 0);
    }

    function enableButtons(enable) {
      ['btn-add5', 'btn-add10', 'btn-pause', 'btn-stop'].forEach(id => {
        const b = document.getElementById(id);
        if (enable) b.classList.add('active-btn');
        else b.classList.remove('active-btn');
      });
    }

    function handleStateChanged(event) {
      parseStateValue(event.target.value);
    }

    function parseStateValue(dataView) {
      const dec = new TextDecoder('utf-8');
      const str = dec.decode(dataView);
      log(`State raw: ${str}`);
      
      // format: v1;toy=EXC-01;state=RUNNING;rem=299;disp=...
      const parts = str.split(';');
      let state = "UNKNOWN";
      let rem = 0;
      
      parts.forEach(p => {
        if(p.startsWith('state=')) state = p.split('=')[1];
        if(p.startsWith('rem=')) rem = parseInt(p.split('=')[1]);
      });

      currentState = state;
      updateUI(state, rem);
    }

    function updateUI(state, remSecs) {
      const badge = document.getElementById('disp-state');
      badge.className = `state-badge ${state}`;
      badge.innerText = state;

      const m = Math.floor(remSecs / 60).toString().padStart(2, '0');
      const s = (remSecs % 60).toString().padStart(2, '0');
      document.getElementById('disp-time').innerText = `${m}:${s}`;

      const btnPause = document.getElementById('btn-pause');
      if (state === 'PAUSED') {
        btnPause.innerText = 'Resume';
      } else {
        btnPause.innerText = 'Pause';
      }
    }

    function togglePause() {
      if (currentState === 'PAUSED') sendCommand('RESUME', 0);
      else sendCommand('PAUSE', 0);
    }

    async function sendCommand(cmd, val) {
      if (!cmdChar) return;
      commandId++;
      // format: v1|command_id|command|value|session_id|nonce|signature
      const payloadStr = `v1|${commandId}|${cmd}|${val}|WEB-SESSION|debug|debug`;
      log(`Sending: ${payloadStr}`);
      
      const enc = new TextEncoder();
      const arr = enc.encode(payloadStr);
      try {
        await cmdChar.writeValue(arr);
      } catch(e) {
        log("Send error: " + e);
      }
    }
  </script>
</body>
</html>
